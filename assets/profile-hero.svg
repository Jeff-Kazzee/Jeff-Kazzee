<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Jeff Kazzee profile hero</title>
  <desc id="desc">Software engineer for agentic operations, local-first tools, typed knowledge systems, and practical AI workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1117"/>
      <stop offset="0.52" stop-color="#111827"/>
      <stop offset="1" stop-color="#1f2933"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
