  <circle cx="1046" cy="180" r="105" fill="none" stroke="url(#blue)" stroke-width="18"/>
  <path d="M 997 231 L 1046 85 L 1095 231" fill="none" stroke="url(#gold)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 967 180 H 1125" stroke="#f9fafb" stroke-width="18" stroke-linecap="round"/>
