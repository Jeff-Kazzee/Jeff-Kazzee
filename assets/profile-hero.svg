  <text x="84" y="214" fill="#f9fafb" font-family="Segoe UI, Arial, sans-serif" font-size="70" font-weight="800">Software engineer</text>
  <text x="88" y="288" fill="#e5e7eb" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="650">for agentic operations</text>
  <text x="88" y="362" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="28">Local-first tools / typed knowledge systems / practical AI workflows</text>
